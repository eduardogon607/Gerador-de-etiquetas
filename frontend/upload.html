<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Planilha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            color: #4f46e5;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #4f46e5;
            border-radius: 15px;
            padding: 60px 30px;
            text-align: center;
            margin: 30px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .upload-area:hover {
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            background: #e0e7ff;
            border-color: #3b82f6;
            border-style: solid;
        }

        .upload-icon {
            font-size: 4rem;
            color: #4f46e5;
            margin-bottom: 20px;
        }

        .upload-text h3 {
            color: #1e293b;
            margin-bottom: 10px;
        }

        .upload-text p {
            color: #64748b;
            margin-bottom: 5px;
        }

        .upload-text small {
            color: #94a3b8;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            justify-content: center;
            margin-top: 10px;
        }

        .btn:hover:not(:disabled) {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            margin-top: 15px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e2e8f0;
            color: #4f46e5;
        }

        .messages {
            margin-top: 25px;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .message.info {
            background: #dbeafe;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 10px 20px;
            background: #f1f5f9;
            border-radius: 10px;
            text-decoration: none;
            color: #475569;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-tab:hover {
            background: #e2e8f0;
            color: #4f46e5;
        }

        .nav-tab.active {
            background: #4f46e5;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>📤</span>
                Upload de Planilha
            </h1>
            <p class="subtitle">Envie sua planilha Excel para gerar etiquetas</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📄</div>
            <div class="upload-text">
                <h3>Clique ou arraste uma planilha</h3>
                <p>Formatos suportados: .xlsx, .xls</p>
                <small>Tamanho máximo: 20MB</small>
            </div>
        </div>

        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">

        <button class="btn" id="uploadBtn" disabled onclick="uploadFile()">
            <span id="btnText">Selecione um arquivo primeiro</span>
        </button>

        <a href="/" class="btn btn-secondary">
            <span>←</span>
            Voltar para o início
        </a>

        <div class="messages" id="messages"></div>

        <div class="nav-tabs">
            <a href="/" class="nav-tab">🏠 Início</a>
            <a href="/upload" class="nav-tab active">📤 Upload</a>
            <a href="/generate" class="nav-tab">🏷️ Gerar</a>
        </div>
    </div>

    <script>
        // Configuração da API
        const API_URL = 'http://localhost:3001/api';
        console.log('🔗 API URL:', API_URL);

        // Estado
        let currentFile = null;

        // Elementos DOM
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const btnText = document.getElementById('btnText');
        const messagesDiv = document.getElementById('messages');

        // Funções de mensagem
        function showMessage(type, text, duration = 5000) {
            const message = document.createElement('div');
            message.className = `message ${type}`;
            
            const icons = {
                success: '✅',
                error: '❌',
                info: 'ℹ️'
            };
            
            message.innerHTML = `
                <span>${icons[type] || '📢'}</span>
                <span>${text}</span>
            `;
            
            messagesDiv.prepend(message);
            
            if (duration > 0) {
                setTimeout(() => {
                    if (message.parentNode === messagesDiv) {
                        messagesDiv.removeChild(message);
                    }
                }, duration);
            }
            
            console.log(`[${type.toUpperCase()}] ${text}`);
        }

        // Configurar drag and drop
        function setupDragAndDrop() {
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                
                if (e.dataTransfer.files.length > 0) {
                    handleFileSelect(e.dataTransfer.files[0]);
                }
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileSelect(e.target.files[0]);
                }
            });
        }

        // Processar seleção de arquivo
        function handleFileSelect(file) {
            // Validar arquivo
            const validTypes = ['.xlsx', '.xls'];
            const fileExt = '.' + file.name.split('.').pop().toLowerCase();
            
            if (!validTypes.includes(fileExt)) {
                showMessage('error', 'Formato inválido. Use apenas .xlsx ou .xls');
                return;
            }

            if (file.size > 20 * 1024 * 1024) {
                showMessage('error', 'Arquivo muito grande. Máximo: 20MB');
                return;
            }

            // Atualizar interface
            currentFile = file;
            
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            
            uploadArea.innerHTML = `
                <div class="upload-icon">📄</div>
                <div class="upload-text">
                    <h3>${file.name}</h3>
                    <p>${sizeMB} MB • Pronto para enviar</p>
                    <small>Clique ou arraste outro arquivo</small>
                </div>
            `;
            
            uploadBtn.disabled = false;
            btnText.textContent = `Enviar "${file.name}"`;
            
            showMessage('info', `Arquivo selecionado: ${file.name} (${sizeMB} MB)`);
            
            // Reconfigurar eventos
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });
        }

        // Upload do arquivo
        async function uploadFile() {
            if (!currentFile) {
                showMessage('error', 'Selecione um arquivo primeiro');
                return;
            }

            // Desabilitar botão
            uploadBtn.disabled = true;
            const originalText = btnText.textContent;
            btnText.innerHTML = '<span class="spinner"></span> Enviando...';

            try {
                const formData = new FormData();
                formData.append('spreadsheet', currentFile);

                showMessage('info', 'Enviando planilha para processamento...');
                console.log('📤 Enviando arquivo para:', API_URL + '/upload');

                const response = await fetch(API_URL + '/upload', {
                    method: 'POST',
                    body: formData
                });

                console.log('📡 Status:', response.status, response.statusText);

                let data;
                try {
                    data = await response.json();
                    console.log('📊 Resposta:', data);
                } catch (jsonError) {
                    console.error('❌ Erro ao parsear JSON:', jsonError);
                    const text = await response.text();
                    console.error('📄 Resposta em texto:', text.substring(0, 500));
                    throw new Error('Resposta inválida do servidor');
                }

                if (response.ok && data.success) {
                    showMessage('success', 
                        `✅ ${data.message}<br>
                        <strong>${currentFile.name}</strong> processado com sucesso!`
                    );

                    // Resetar interface
                    uploadArea.innerHTML = `
                        <div class="upload-icon">✅</div>
                        <div class="upload-text">
                            <h3>Upload Concluído!</h3>
                            <p>${data.spreadsheet.rowCount} linhas processadas</p>
                            <small>Clique ou arraste outro arquivo</small>
                        </div>
                    `;

                    fileInput.value = '';
                    currentFile = null;
                    uploadBtn.disabled = true;
                    btnText.textContent = 'Selecione um arquivo primeiro';

                    // Redirecionar para gerar etiquetas após 2 segundos
                    setTimeout(() => {
                        window.location.href = '/generate';
                    }, 2000);

                } else {
                    throw new Error(data.error || `Erro ${response.status}: ${response.statusText}`);
                }

            } catch (error) {
                console.error('❌ Erro no upload:', error);
                showMessage('error', `Falha no upload: ${error.message}`);
                
                uploadBtn.disabled = false;
                btnText.textContent = originalText;
            }
        }

        // Testar conexão com a API
        async function testConnection() {
            try {
                const response = await fetch(API_URL + '/ping');
                const data = await response.json();
                console.log('✅ Conexão com API:', data.message);
                return true;
            } catch (error) {
                console.error('❌ Não foi possível conectar à API:', error);
                showMessage('error', 'Não foi possível conectar ao servidor. Verifique se o backend está rodando.');
                return false;
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📤 Página de upload carregada');
            
            // Configurar drag and drop
            setupDragAndDrop();
            
            // Testar conexão
            testConnection();
        });
    </script>
</body>
</html>
