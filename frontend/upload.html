<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload de Planilha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #f0f0f0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            max-width: 500px; 
            width: 100%; 
        }
        h1 { 
            color: #4f46e5; 
            margin-bottom: 20px; 
            text-align: center; 
        }
        
        /* Status da conexão */
        #status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #ddd;
            background: #f8fafc;
        }
        #status.online { background: #d1fae5; border-color: #10b981; color: #065f46; }
        #status.offline { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
        #status.loading { background: #dbeafe; border-color: #3b82f6; color: #1e40af; }
        
        .upload-area {
            border: 3px dashed #4f46e5;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f0f4ff;
        }
        .btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn:hover:not(:disabled) {
            background: #4338ca;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .mensagem {
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            text-align: center;
        }
        .sucesso { background: #d1fae5; color: #065f46; }
        .erro { background: #fee2e2; color: #991b1b; }
        .info { background: #dbeafe; color: #1e40af; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .navigation {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .nav-link {
            color: #4f46e5;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .nav-link:hover {
            background: #f0f4ff;
        }
        
        /* ========== RESPONSIVIDADE ========== */
        @media (max-width: 768px) {
            body {
                padding: 15px;
                align-items: flex-start;
                min-height: auto;
                padding-top: 30px;
            }
            
            .container {
                padding: 20px;
                max-width: 100%;
            }
            
            h1 {
                font-size: 1.5em;
                margin-bottom: 15px;
            }
            
            .upload-area {
                padding: 30px 15px;
                margin: 15px 0;
            }
            
            .upload-area h3 {
                font-size: 1.1em;
                margin-bottom: 8px;
            }
            
            .upload-area p {
                font-size: 0.9em;
                margin-bottom: 5px;
            }
            
            .upload-area small {
                font-size: 0.8em;
            }
            
            .btn {
                padding: 14px 20px;
                font-size: 15px;
                margin-top: 12px;
                min-height: 50px;
            }
            
            .mensagem {
                padding: 12px;
                font-size: 0.9em;
            }
            
            .navigation {
                flex-direction: column;
                gap: 10px;
            }
            
            .nav-link {
                padding: 12px;
                text-align: center;
                font-size: 0.95em;
            }
            
            #status {
                padding: 12px;
                font-size: 0.9em;
            }
            
            /* Ajuste para ícones no mobile */
            .upload-area div[style*="font-size: 48px"] {
                font-size: 40px !important;
                margin-bottom: 10px !important;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
                padding-top: 20px;
            }
            
            .container {
                padding: 15px;
                border-radius: 8px;
            }
            
            h1 {
                font-size: 1.3em;
            }
            
            .upload-area {
                padding: 25px 10px;
                border-width: 2px;
            }
            
            .upload-area h3 {
                font-size: 1em;
            }
            
            .upload-area p {
                font-size: 0.85em;
            }
            
            .btn {
                padding: 12px 16px;
                font-size: 14px;
                min-height: 46px;
            }
            
            .nav-link {
                padding: 10px;
                font-size: 0.9em;
            }
            
            .mensagem {
                padding: 10px;
                font-size: 0.85em;
            }
        }
        
        @media (max-width: 375px) {
            .upload-area {
                padding: 20px 10px;
            }
            
            .upload-area div[style*="font-size: 48px"] {
                font-size: 36px !important;
            }
            
            .btn {
                padding: 10px 14px;
                font-size: 13px;
            }
        }
        
        /* Para landscape em mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 10px;
                align-items: flex-start;
                padding-top: 20px;
            }
            
            .container {
                max-height: 95vh;
                overflow-y: auto;
            }
            
            .upload-area {
                padding: 20px;
            }
        }
        
        /* Melhorias para toque */
        @media (hover: none) and (pointer: coarse) {
            .upload-area:hover,
            .nav-link:hover,
            .btn:hover:not(:disabled) {
                background: none;
                transform: none;
            }
            
            .upload-area:active,
            .nav-link:active,
            .btn:active:not(:disabled) {
                transform: scale(0.98);
                opacity: 0.9;
            }
            
            /* Tamanho mínimo para toque */
            .upload-area,
            .btn,
            .nav-link {
                min-height: 44px;
            }
        }
        
        /* Evitar zoom em inputs no iOS */
        @supports (-webkit-touch-callout: none) {
            input, select, textarea {
                font-size: 16px !important;
            }
        }
        
        /* Ajuste de drag and drop no mobile */
        @media (pointer: coarse) {
            .upload-area {
                border-style: solid;
            }
        }
    </style>
</head>
<body>
    <!-- O HTML CONTINUA EXATAMENTE IGUAL -->
    <div class="container">
        <h1>📤 Upload de Planilha</h1>
        
        <!-- Status da conexão -->
        <div id="status" class="loading">
            <span class="spinner"></span> Verificando conexão...
        </div>
        
        <!-- Mensagens do sistema -->
        <div id="mensagens"></div>
        
        <!-- Área de upload -->
        <div class="upload-area" onclick="document.getElementById('arquivo').click()">
            <div style="font-size: 48px; margin-bottom: 10px;">📄</div>
            <h3>Clique para selecionar uma planilha</h3>
            <p>Formatos: .xlsx, .xls</p>
            <small>Tamanho máximo: 10MB</small>
        </div>
        
        <!-- Input de arquivo -->
        <input type="file" id="arquivo" accept=".xlsx,.xls" style="display: none;">
        
        <!-- Botão de envio -->
        <button class="btn" id="uploadBtn" onclick="enviarArquivo()" disabled>
            📤 Enviar Planilha
        </button>
        
        <!-- Navegação -->
        <div class="navigation">
            <a href="/" class="nav-link">🏠 Início</a>
            <a href="/upload" class="nav-link">📤 Upload</a>
            <a href="/generate" class="nav-link">🏷️ Gerar Etiquetas</a>
        </div>
    </div>

    <script>
        // O JAVASCRIPT CONTINUA EXATAMENTE IGUAL
        // ========== CONFIGURAÇÕES ==========
        // URL da API - se estiver na mesma origem, usa relativa
        // DEPOIS - COM FALLBACK:
const API_URL = (function() {
    // Se estiver em localhost
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        return 'http://localhost:3001/api';
    }
    // Se estiver no Render (substitua pelo SEU backend URL)
    return 'https://seu-backend.onrender.com/api';
})();

console.log('🌐 URL Atual:', window.location.href);
console.log('🔗 API URL Configurada:', API_URL);
        console.log('🔗 API URL:', API_URL);
        
        let conexaoAtiva = false;
        let arquivoSelecionado = null;
        
        // ========== FUNÇÕES PRINCIPAIS ==========
        
        // Testar conexão de forma segura
        async function testarConexao() {
            console.log('📡 Testando conexão com:', API_URL + '/ping');
            
            const statusDiv = document.getElementById('status');
            if (!statusDiv) {
                console.error('❌ Elemento #status não encontrado');
                return false;
            }
            
            try {
                statusDiv.className = 'loading';
                statusDiv.innerHTML = '<span class="spinner"></span> Conectando...';
                
                // Testar com timeout
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const resposta = await fetch(API_URL + '/ping', {
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                // Tentar como JSON
                try {
                    const dados = await resposta.json();
                    console.log('✅ Conexão OK:', dados);
                    
                    statusDiv.className = 'online';
                    statusDiv.innerHTML = `
                        ✅ <strong>Backend Conectado!</strong><br>
                        <small>Servidor: ${dados.server || 'Etiquetas API'}</small>
                    `;
                    
                    conexaoAtiva = true;
                    mostrarMensagem('sucesso', 'Sistema pronto para uso!');
                    return true;
                    
                } catch (jsonError) {
                    // Se não for JSON, verificar se pelo menos responde
                    if (resposta.ok) {
                        statusDiv.className = 'online';
                        statusDiv.innerHTML = '✅ Backend respondendo (mas não em JSON)';
                        conexaoAtiva = true;
                        return true;
                    }
                    throw new Error('Resposta não é JSON');
                }
                
            } catch (error) {
                console.error('❌ Erro de conexão:', error);
                
                statusDiv.className = 'offline';
                statusDiv.innerHTML = `
                    ❌ <strong>Backend Offline</strong><br>
                    <small>${error.message}</small>
                `;
                
                conexaoAtiva = false;
                mostrarMensagem('erro', 'Não foi possível conectar ao servidor');
                return false;
            }
        }
        
        // Quando selecionar arquivo
        document.getElementById('arquivo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            arquivoSelecionado = file;
            
            // Validar arquivo
            if (!validarArquivo(file)) {
                arquivoSelecionado = null;
                document.getElementById('uploadBtn').disabled = true;
                return;
            }
            
            // Atualizar visual
            const uploadArea = document.querySelector('.upload-area');
            const tamanhoMB = (file.size / (1024 * 1024)).toFixed(2);
            
            uploadArea.innerHTML = `
                <div style="font-size: 48px; margin-bottom: 10px; color: #10b981;">📄</div>
                <h3>${file.name}</h3>
                <p>${tamanhoMB} MB • Pronto para enviar</p>
                <small>Clique para selecionar outro arquivo</small>
            `;
            
            // Habilitar botão
            document.getElementById('uploadBtn').disabled = false;
            
            mostrarMensagem('info', `Arquivo "${file.name}" selecionado`);
        });
        
        // Validar arquivo
        function validarArquivo(file) {
            // Tipo
            if (!file.name.match(/\.(xlsx|xls)$/i)) {
                mostrarMensagem('erro', 'Apenas arquivos Excel (.xlsx, .xls) são permitidos');
                return false;
            }
            
            // Tamanho (10MB)
            if (file.size > 10 * 1024 * 1024) {
                mostrarMensagem('erro', 'Arquivo muito grande. Máximo: 10MB');
                return false;
            }
            
            return true;
        }
        
        // Enviar arquivo
        async function enviarArquivo() {
            if (!conexaoAtiva) {
                mostrarMensagem('erro', 'Servidor offline. Verifique a conexão.');
                return;
            }
            
            if (!arquivoSelecionado) {
                mostrarMensagem('erro', 'Selecione um arquivo primeiro!');
                return;
            }
            
            console.log('📤 Enviando arquivo:', arquivoSelecionado.name);
            
            const btn = document.getElementById('uploadBtn');
            const btnOriginal = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Enviando...';
            
            try {
                const formData = new FormData();
                formData.append('spreadsheet', arquivoSelecionado);
                
                mostrarMensagem('info', 'Enviando arquivo...');
                
                const resposta = await fetch(API_URL + '/upload', {
                    method: 'POST',
                    body: formData
                });
                
                console.log('📡 Status:', resposta.status);
                
                // Tentar parsear como JSON
                let dados;
                try {
                    dados = await resposta.json();
                } catch (e) {
                    // Se não for JSON, criar objeto básico
                    dados = {
                        sucesso: resposta.ok,
                        mensagem: resposta.ok ? 'Arquivo enviado' : 'Erro no servidor'
                    };
                }
                
                if (!resposta.ok) {
                    throw new Error(dados.erro || dados.error || `Erro ${response.status}`);
                }
                
                if (dados.sucesso || resposta.ok) {
                    // Sucesso
                    mostrarMensagem('sucesso', 
                        `✅ ${dados.mensagem || 'Arquivo enviado com sucesso!'}<br>
                        <strong>${arquivoSelecionado.name}</strong>`
                    );
                    
                    // Resetar
                    document.getElementById('arquivo').value = '';
                    arquivoSelecionado = null;
                    
                    document.querySelector('.upload-area').innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 10px; color: #10b981;">✅</div>
                        <h3>Upload concluído!</h3>
                        <p>Clique para enviar outra planilha</p>
                    `;
                    
                    btn.disabled = true;
                    
                } else {
                    mostrarMensagem('erro', dados.erro || dados.error || 'Erro desconhecido');
                    btn.disabled = false;
                }
                
            } catch (error) {
                console.error('❌ Erro no upload:', error);
                mostrarMensagem('erro', `Falha no upload: ${error.message}`);
                btn.disabled = false;
                
            } finally {
                btn.innerHTML = btnOriginal;
            }
        }
        
        // Mostrar mensagem
        function mostrarMensagem(tipo, texto) {
            const div = document.getElementById('mensagens');
            const msg = document.createElement('div');
            msg.className = `mensagem ${tipo}`;
            msg.innerHTML = texto;
            
            // Limpar mensagens anteriores
            div.innerHTML = '';
            div.appendChild(msg);
            
            // Auto-remover após 5 segundos
            setTimeout(() => {
                if (div.contains(msg)) {
                    div.removeChild(msg);
                }
            }, 5000);
        }
        
        // ========== INICIALIZAÇÃO ==========
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Página carregada');
            
            // Testar conexão
            await testarConexao();
            
            // Configurar drag and drop simples
            const uploadArea = document.querySelector('.upload-area');
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#f0f4ff';
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.background = '';
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.background = '';
                
                if (e.dataTransfer.files.length) {
                    const file = e.dataTransfer.files[0];
                    if (file.name.match(/\.(xlsx|xls)$/i)) {
                        document.getElementById('arquivo').files = e.dataTransfer.files;
                        
                        // Disparar evento change
                        const event = new Event('change');
                        document.getElementById('arquivo').dispatchEvent(event);
                    } else {
                        mostrarMensagem('erro', 'Apenas arquivos Excel são permitidos');
                    }
                }
            });
        });
    </script>
</body>
</html>
