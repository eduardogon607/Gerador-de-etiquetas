<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Planilhas - Sistema de Etiquetas</title>
    <style>
        /* RESET MOBILE */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        :root {
            --primary: #6366f1; 
            --primary-dark: #4f46e5; 
            --secondary: #f8fafc;
            --accent: #06d6a0; 
            --text: #1e293b; 
            --text-light: #64748b;
            --border: #e2e8f0; 
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
            --danger: #ef4444;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            color: var(--text); 
            line-height: 1.5;
            padding: 0;
            margin: 0;
        }
        
        .container {
            background: white;
            min-height: 100vh;
            max-width: 100%;
            overflow-x: hidden;
        }
        
        /* HEADER MOBILE */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; 
            padding: 1rem;
        }
        
        .header h1 {
            font-size: 1.4rem;
            font-weight: 700; 
            margin-bottom: 1rem;
        }
        
        /* TABS MOBILE */
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.15);
            border-radius: 10px; 
            padding: 3px;
            gap: 2px;
        }
        
        .tab {
            padding: 10px 12px;
            color: white; 
            text-decoration: none;
            background: transparent; 
            border: none; 
            border-radius: 8px;
            cursor: pointer; 
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            flex: 1;
            text-align: center;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tab.active {
            background: white; 
            color: var(--primary);
        }
        
        /* MAIN CONTENT MOBILE */
        .main-content { 
            padding: 1rem;
            background: var(--secondary); 
            min-height: calc(100vh - 140px);
        }
        
        .upload-card, .files-card {
            background: white; 
            padding: 1.5rem 1rem;
            border-radius: 12px;
            box-shadow: var(--shadow); 
            margin-bottom: 1rem; 
            border: 1px solid var(--border);
        }
        
        .upload-card h2, .files-card h2 {
            color: var(--text); 
            margin-bottom: 1rem; 
            font-size: 1.3rem;
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        
        /* UPLOAD AREA MOBILE */
        .upload-area {
            border: 2px dashed var(--border); 
            border-radius: 12px;
            padding: 2rem 1rem;
            text-align: center; 
            transition: all 0.3s ease;
            background: var(--secondary); 
            margin-bottom: 1rem;
        }
        
        .upload-area.dragover {
            border-color: var(--primary); 
            background: #f0f9ff;
        }
        
        .upload-icon {
            font-size: 2.5rem; 
            margin-bottom: 1rem; 
            display: block;
        }
        
        .upload-text {
            color: var(--text-light); 
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        
        .file-input {
            display: none;
        }
        
        /* BOTÕES MOBILE */
        .btn {
            padding: 14px 20px; 
            border: none; 
            border-radius: 10px;
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        /* MENSAGENS */
        .success-message {
            background: #d1fae5; 
            color: #065f46; 
            padding: 12px;
            border-radius: 8px; 
            margin-top: 1rem; 
            text-align: center;
            font-size: 0.9rem;
        }
        
        .error-message {
            background: #fee2e2; 
            color: #991b1b; 
            padding: 12px;
            border-radius: 8px; 
            margin-top: 1rem; 
            text-align: center;
            font-size: 0.9rem;
        }
        
        /* LISTA DE ARQUIVOS MOBILE */
        .file-list {
            margin-top: 1rem;
        }
        
        .file-item {
            display: flex; 
            flex-direction: column;
            gap: 0.75rem;
            padding: 1rem; 
            background: var(--secondary); 
            border-radius: 8px;
            margin-bottom: 0.75rem; 
            border: 1px solid var(--border);
        }
        
        .file-info {
            flex: 1;
        }
        
        .file-name {
            font-weight: 600; 
            color: var(--text);
            font-size: 0.95rem;
            word-break: break-word;
        }
        
        .file-details {
            font-size: 0.8rem; 
            color: var(--text-light);
            margin-top: 4px;
        }
        
        .file-actions {
            display: flex; 
            gap: 8px;
        }
        
        .delete-button {
            background: var(--danger); 
            color: white; 
            border: none;
            padding: 10px 16px; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 0.85rem;
            flex: 1;
            text-align: center;
        }
        
        .refresh-button {
            background: var(--accent); 
            color: white; 
            border: none;
            padding: 10px 16px; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .empty-state {
            text-align: center; 
            padding: 2rem 1rem; 
            color: var(--text-light);
        }
        
        .empty-state .icon { 
            font-size: 2.5rem; 
            margin-bottom: 1rem; 
            display: block; 
        }
        
        /* HEADER COM BOTÃO */
        .card-header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        /* TABLET */
        @media (min-width: 768px) {
            .header {
                padding: 1.5rem 2rem;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .main-content {
                padding: 2rem;
            }
            
            .upload-card, .files-card {
                padding: 2rem;
            }
            
            .upload-area {
                padding: 3rem;
            }
            
            .file-item {
                flex-direction: row;
                align-items: center;
            }
            
            .file-actions {
                width: auto;
            }
            
            .delete-button {
                flex: none;
                width: auto;
            }
            
            .card-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            
            .btn {
                width: auto;
                min-width: 200px;
            }
        }
        
        /* CELULARES PEQUENOS */
        @media (max-width: 360px) {
            .header {
                padding: 0.75rem;
            }
            
            .header h1 {
                font-size: 1.2rem;
            }
            
            .tab {
                padding: 8px 10px;
                font-size: 0.8rem;
            }
            
            .upload-card, .files-card {
                padding: 1rem;
            }
            
            .upload-area {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📤 Upload de Planilhas</h1>
            <nav class="tabs">
                <a href="/" class="tab">Início</a>
                <a href="/upload" class="tab active">Uploads</a>
                <a href="/generate" class="tab">Gerar Etiquetas</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="upload-card">
                <h2>Fazer Upload de Planilha</h2>
                
                <div class="upload-area" id="uploadArea">
                    <span class="upload-icon">📄</span>
                    <h3 style="margin-bottom: 1rem; font-size: 1.1rem;">Arraste sua planilha aqui</h3>
                    <p class="upload-text">ou clique para selecionar um arquivo</p>
                    <p style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 1rem;">
                        Formatos: .xlsx, .xls (até 10MB)
                    </p>
                    <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls">
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                        📁 Selecionar Arquivo
                    </button>
                </div>

                <div id="uploadStatus"></div>
            </div>

            <div class="files-card">
                <div class="card-header">
                    <h2>Planilhas Carregadas</h2>
                    <button class="refresh-button" onclick="loadSpreadsheets()">
                        🔄 Atualizar
                    </button>
                </div>
                
                <div id="filesList">
                    <div class="empty-state">
                        <span class="icon">📊</span>
                        <p>Nenhuma planilha carregada</p>
                        <p style="font-size: 0.85rem; margin-top: 0.5rem;">Faça upload de uma planilha para começar</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

   <script>
    // ✅ CONFIGURAÇÃO INTELIGENTE DA API URL
    function getApiUrl() {
        // Se estiver no localhost, usa localhost, senão usa a URL atual
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            return 'http://localhost:3000/api';
        } else {
            return window.location.origin + '/api';
        }
    }

    const API_URL = getApiUrl();
    
    console.log('🌐 API URL configurada:', API_URL);
    console.log('📍 URL atual:', window.location.href);

    // Testar conexão com a API
    async function testConnection() {
        try {
            console.log('🔗 Testando conexão com API...');
            const response = await fetch(API_URL + '/test');
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const data = await response.json();
            console.log('✅ Conexão com API OK:', data);
            
            // Mostrar status na página se houver elemento
            const statusElement = document.getElementById('statusInfo');
            if (statusElement) {
                statusElement.innerHTML = `<div style="background: #d1fae5; color: #065f46; padding: 10px; border-radius: 6px; margin: 10px 0;">
                    <strong>✅ Conectado</strong> - Backend funcionando: ${data.environment}
                </div>`;
            }
            
        } catch (error) {
            console.error('❌ Erro na conexão com API:', error);
            
            // Mostrar erro na página se houver elemento
            const statusElement = document.getElementById('statusInfo');
            if (statusElement) {
                statusElement.innerHTML = `<div style="background: #fee2e2; color: #991b1b; padding: 10px; border-radius: 6px; margin: 10px 0;">
                    <strong>❌ Erro de conexão</strong> - Não foi possível conectar ao servidor. Detalhes no console.
                </div>`;
            }
            
            // Tentar URL alternativa se a principal falhar
            if (API_URL.includes('localhost')) {
                console.log('🔄 Tentando URL alternativa...');
                const alternativeUrl = window.location.origin + '/api';
                if (alternativeUrl !== API_URL) {
                    console.log('🔄 Testando:', alternativeUrl);
                    // Você pode implementar uma segunda tentativa aqui se necessário
                }
            }
        }
    }

    // Carregar quando a página carregar
    document.addEventListener('DOMContentLoaded', () => {
        console.log('🚀 Página carregada');
        console.log('📍 Hostname:', window.location.hostname);
        console.log('🔗 API URL:', API_URL);
        
        testConnection();
    });
</script>
</body>
</html>
